server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:retencao;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: 12345678901234567890123456789012
    expiration: 86400000